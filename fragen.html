<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <title>Fragen</title>  
    <link rel="stylesheet" href="src/styles.css">
    <script src="fragen.js"></script>
</head>

<body>

    <div class = background> </div>
    
    <main class = "menu">
        
        <div class = "rectangle">
            <p>Frage 1 von 10</p>
        </div>

        <div class = "circleTimer">
            <p id="timeValue">
                time
            </p>
        </div>

        <div class = "rectangleQuestion">
            <p>Hier steht die Frage</p>
        
        </div>

        <div class = "layout" id="answerButtons">
            <button class="buttonAnswers">Antwort 1</button>
            <button class="buttonAnswers">Antwort 2</button>
            <button class="buttonAnswers">Antwort 3</button>
            <button class="buttonAnswers">Antwort 4</button>
        </div>

        <div id="popUp" style="display: none;">
            <p id="answerText">
                placeholder
            </p>
            <div id="nextQuestionBtn">
                <p>Zur nächsten Frage ▶</p>
            </div>
        </div>
</main>
   
</body>
</html>
