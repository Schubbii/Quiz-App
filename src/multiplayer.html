<!-- enthält Design des Menüs-->

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Spiel Menü</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="background"></div>
    <main id="Hauptmenue" class="menu">

<div class="quizSettings">
  <label for="player1-name" class="settingsLabel">Player 1</label>

  <div class="questionCountBox">
    <input
      id="player1-name"
      class="questionCountInput"
      type="text"
      placeholder="Name von Player 1"
      maxlength="20"
    />
  </div>

  <label for="player2-name" class="settingsLabel">Player 2</label>

  <div class="questionCountBox">
    <input
      id="player2-name"
      class="questionCountInput"
      type="text"
      placeholder="Name von Player 2"
      maxlength="20"
    />
  </div>

  <label for="question-count" class="settingsLabel">Anzahl der Fragen</label>

  <div class="questionCountBox">
    <input
      id="question-count"
      class="questionCountInput"
      type="number"
      min="1"
      value="5"
    />
    <span class="questionCountHint" id="max-questions-info"></span>
  </div>

  <label for="category-select" class="settingsLabel">Kategorie</label>

<div class="questionCountBox">
  <select id="category-select" class="questionCountInput">
    <option value="all">Alle Kategorien</option>
  </select>
</div>

  <button id="start-quiz-btn" class="playBtn">
    Quiz starten
  </button>
  <button class ="menuBtn" id="backBtn">Zurück</button>
  <button id = "openBtn"class="menuBtn">Settings</button>
            <dialog id="popupDialog">
              
              <input type="checkbox" id="musicToggle" name="musicToggle">Musik An/Aus
              <button id="closeBtn" class="menuBtn">Zurück</button>
            </dialog>
</div>

        <!-- <button class="playBtn">PLAY</button> -->
        
    </main>

    <script src="renderer.js"></script>
</body>
</html>
