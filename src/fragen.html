<!-- Fragenseiten -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fragen</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background"></div>

    <main class="menu">
       <div class="topBar">
  <div class="rectangle">
    <div>
      <p class="FragenText">Frage 1 von 10</p>
      <p id="player-display" class="playerDisplay hidden"></p>
    </div>
  </div>

  <div class="circleTimer">
    <p id="timeValue">10</p>
  </div>
</div>
        <div class="rectangleQuestion">
            <h2 id="question2">Hier steht die Frage</h2>
        </div>
        <p id="result-text" class="resultText"></p>
        <div class="layout" id="answers">
            <!-- Antwort-Buttons werden hier dynamisch hinzugefügt -->
        </div>
        <button id="next-btn" class="buttonAnswers hidden">Weiter</button>

        <button id="time-powerup-btn" class="timePowerup" type="button" aria-label="Zeit-Power-up verwenden" title="Dieses Power-up gibt dir 5 zusätzliche Sekunden Zeit, um die Frage zu beantworten.">
            <span class="timePowerupIcon" aria-hidden="true">
                <!-- Platzhalter: Hier kannst du später dein Icon-Bild einfügen, z. B.:
                <img src="./pfad/zum/powerup-icon.png" alt="" />
                -->
                +5
            </span>
            <span id="time-powerup-count" class="timePowerupCount">0</span>
        </button>

        <button id="menu-btn" class="buttonAnswers hidden">Zum Menü</button>
    </main>
    <script src="renderer.js"></script>
</body>
</html>
