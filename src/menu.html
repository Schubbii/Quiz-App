<!-- enthält Design des Menüs-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spiel Menü</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="Startanimation">
        <video id="Logoanimation" autoplay muted playsinline>
            <source src="../Logo/Logoanimation.mp4" type="video/mp4" />
            Dein Browser unterstützt kein Video.
        </video>
    </div>

    <div class="background"></div>
    <main id="Hauptmenue" class="menu hidden">
        <div class="layout">
            <!-- <button class="menuBtn">CATEGORY</button>
            <button class="menuBtn">SETTINGS</button>
            <button class="menuBtn">STATS</button>
            <button class="menuBtn">FRIENDS</button> -->
        </div>

<div class="quizSettings">
  <label for="question-count" class="settingsLabel">Anzahl der Fragen</label>

  <div class="questionCountBox">
    <input
      id="question-count"
      class="questionCountInput"
      type="number"
      min="1"
      value="5"
    />
    <span class="questionCountHint" id="max-questions-info"></span>
  </div>

  <label for="category-select" class="settingsLabel">Kategorie</label>

<div class="questionCountBox">
  <select id="category-select" class="questionCountInput">
    <option value="all">Alle Kategorien</option>
  </select>
</div>

  <button id="start-quiz-btn" class="playBtn">
    Quiz starten
  </button>
</div>

        <!-- <button class="playBtn">PLAY</button> -->
        <button id="admin-btn">Admin</button>
    </main>

    <script src="renderer.js"></script>
</body>
</html>
