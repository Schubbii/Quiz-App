<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz beendet</title>
  <link href="https://fonts.googleapis.com/css2?family=Radio+Canada+Big:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="score.css" />
</head>
<body>
  <div class="background"></div>

  <main class="scoreboard-page">
    <h1 class="scoreboard-title">QUIZ BEENDET</h1>

    <section class="scoreboard-card">
      <div class="scoreboard-meta">
        <p class="scoreboard-category">Kategorie: Allgemeinwissen</p>
        <p class="scoreboard-time">Zeit: 02:50</p>
      </div>

      <div class="scoreboard-stats">
        <article class="stat-card">
          <h2 class="stat-label stat-label--correct">Richtig</h2>
          <p class="stat-value stat-value--correct" id="score-correct">0</p>
        </article>

        <article class="stat-card">
          <h2 class="stat-label stat-label--wrong">Falsch</h2>
          <p class="stat-value stat-value--wrong" id="score-wrong">0</p>
        </article>

        <article class="stat-card">
          <h2 class="stat-label stat-label--quote">Quote</h2>
          <p class="stat-value stat-value--quote" id="score-percentage">0%</p>
        </article>
      </div>
    </section>

    <div class="scoreboard-actions">
      <button class="action-btn action-btn--primary" id="restart-btn">PLAY AGAIN</button>
      <button class="action-btn action-btn--primary" id="menu-btn">MAIN MENU</button>
    </div>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
