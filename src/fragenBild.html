<!-- Fragenseiten -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fragen</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background"></div>

    <main class="menu">
        <div class="topBarKleiner">
            <div class="rectangle">
                <div>
                    <p class="FragenText">Frage 1 von 10</p>
                    <p id="player-display" class="playerDisplay hidden"></p>
                </div>
            </div>

            <div class="circleTimer">
                <p id="timeValue">10</p>
            </div>
        </div>
        <div class="rectangleQuestionKleiner">
            <h2 id="question2">Hier steht die Frage</h2>
        </div>
        <p id="result-text" class="resultText"></p>

        <div class="layoutNeu">
            <div class="image">
            </div>

            <div class="layoutButtonsNeu">

                <div id="answers">
                    <!-- Antwort-Buttons werden hier dynamisch hinzugefügt -->
                </div>
                <button id="next-btn" class="buttonAnswers hidden">Weiter</button>
                <button id="menu-btn" class="buttonAnswers hidden">Zum Menü</button>
            </div>

        </div>

        <input type="file" id="jsonFile" name="jsonFile" style="position:fixed; top: 0px; left: 0px;">
    </main>
    <script src="renderer.js"></script>
</body>


</html>
