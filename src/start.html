<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Spiel Menü</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- --Philipp Rostock-- -->
    <div id="Startanimation">
        <video id="Logoanimation" autoplay muted playsinline>
            <source src="../Logo/Logoanimation.mp4" type="video/mp4" />
            Dein Browser unterstützt kein Video.
        </video>
    </div>

    <div class="background"></div>

    <!-- --Kira Grauf-- -->
    <main id="Hauptmenue" class="menu">
        <div class="layoutStart">
            <button id="openBtn" class="menuBtn">Settings</button>
            <dialog id="popupDialog">

                <!-- --Vincent Rothweiler-- -->
                <input type="checkbox" id="musicToggle" name="musicToggle">Musik stummschalten
                <br>
                <input type="checkbox" id="ButtonsToggle" name="ButtonsToggle">Buttons stummschalten
                <button id="closeBtn" class="menuBtn">Zurück</button>
            </dialog>

            <button id="singleplayerBtn" class="menuBtn">Singleplayer</button>
            <button id="multiplayerBtn" class="menuBtn">Multiplayer</button>
        </div>
    </main>

    <script src="renderer.js"></script>

</body>

</html>
